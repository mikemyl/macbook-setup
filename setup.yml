---
- name: Setup development environment
  hosts: all
  gather_facts: true

  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Check for local overrides
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/vars/local.yml"
      register: local_vars_file

    - name: Load local overrides if present
      ansible.builtin.include_vars:
        file: vars/local.yml
      when: local_vars_file.stat.exists

  tasks:
    - name: Display target system info
      ansible.builtin.debug:
        msg: "Setting up {{ ansible_facts['system'] }} ({{ ansible_facts['distribution'] | default('Unknown') }})"

    - name: Include shell setup tasks
      ansible.builtin.import_tasks: tasks/shell.yml
      tags: [shell]

    - name: Include Homebrew tasks
      ansible.builtin.import_tasks: tasks/homebrew.yml
      tags: [homebrew]

    - name: Include environment setup tasks
      ansible.builtin.import_tasks: tasks/environment.yml
      tags: [environment, env]

    - name: Include font installation tasks
      ansible.builtin.import_tasks: tasks/fonts.yml
      tags: [fonts]

    - name: Include Neovim configuration tasks
      ansible.builtin.import_tasks: tasks/nvim-config.yml
      tags: [nvim, neovim]

    - name: Include Karabiner-Elements configuration tasks
      ansible.builtin.import_tasks: tasks/karabiner.yml
      tags: [karabiner]

    - name: Include development setup tasks
      ansible.builtin.import_tasks: tasks/development.yml
      tags: [development]

    - name: Include Claude Code setup tasks
      ansible.builtin.import_tasks: tasks/claude.yml
      tags: [claude, ai]
