---
# Claude Code setup: verified-development plugin, community skills, CLAUDE.md

- name: Create Claude config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ claude_dir }}"
    - "{{ claude_dir }}/skills"
    - "{{ claude_dir }}/agents"

# ── Skills from citypaul/.dotfiles ───────────────────────────────────────────

- name: Clone citypaul/.dotfiles for skills and agents
  ansible.builtin.git:
    repo: https://github.com/citypaul/.dotfiles.git
    dest: "{{ claude_cache_dir }}/citypaul-dotfiles"
    version: main
    depth: 1
    force: true

- name: Copy skills from citypaul/.dotfiles
  ansible.builtin.copy:
    src: "{{ claude_cache_dir }}/citypaul-dotfiles/claude/.claude/skills/{{ item }}/"
    dest: "{{ claude_dir }}/skills/{{ item }}/"
    mode: '0644'
    directory_mode: '0755'
    remote_src: true
  loop: "{{ citypaul_skills }}"

- name: Copy agents from citypaul/.dotfiles
  ansible.builtin.copy:
    src: "{{ claude_cache_dir }}/citypaul-dotfiles/claude/.claude/agents/{{ item }}"
    dest: "{{ claude_dir }}/agents/{{ item }}"
    mode: '0644'
    remote_src: true
  loop: "{{ citypaul_agents }}"

# ── Skills from vercel/vercel-plugin ──────────────────────────────────────────

- name: Clone vercel/vercel-plugin for skills
  ansible.builtin.git:
    repo: https://github.com/vercel/vercel-plugin.git
    dest: "{{ claude_cache_dir }}/vercel-plugin"
    version: main
    depth: 1
    force: true

- name: Copy skills from vercel/vercel-plugin
  ansible.builtin.copy:
    src: "{{ claude_cache_dir }}/vercel-plugin/skills/{{ item }}/"
    dest: "{{ claude_dir }}/skills/{{ item }}/"
    mode: '0644'
    directory_mode: '0755'
    remote_src: true
  loop: "{{ vercel_skills }}"

# ── Bundled skills (no upstream source) ──────────────────────────────────────

- name: Copy bundled skills
  ansible.builtin.copy:
    src: "claude/skills/{{ item }}/"
    dest: "{{ claude_dir }}/skills/{{ item }}/"
    mode: '0644'
    directory_mode: '0755'
  loop:
    - accessibility
    - best-practices
    - performance

# ── CLAUDE.md ────────────────────────────────────────────────────────────────

- name: Check for local CLAUDE.md override
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/files/claude/CLAUDE.local.md"
  register: claude_local_md

- name: Deploy CLAUDE.md (local override)
  ansible.builtin.copy:
    src: claude/CLAUDE.local.md
    dest: "{{ claude_dir }}/CLAUDE.md"
    mode: '0644'
  when: claude_local_md.stat.exists

- name: Deploy CLAUDE.md (default)
  ansible.builtin.copy:
    src: claude/CLAUDE.md
    dest: "{{ claude_dir }}/CLAUDE.md"
    mode: '0644'
  when: not claude_local_md.stat.exists

# ── Settings & plugin registration ───────────────────────────────────────────

- name: Deploy Claude settings.json if none exists
  ansible.builtin.template:
    src: claude-settings.json.j2
    dest: "{{ claude_dir }}/settings.json"
    mode: '0644'
    force: false

- name: Ensure cache directory exists
  ansible.builtin.file:
    path: "{{ claude_cache_dir }}"
    state: directory
    mode: '0755'

- name: Write marketplace and plugin data for settings merge
  ansible.builtin.copy:
    content: "{{ {'marketplaces': claude_extra_marketplaces, 'plugins': claude_plugins} | to_json }}"
    dest: "{{ claude_cache_dir }}/settings-merge.json"
    mode: '0644'

- name: Merge marketplaces and plugins into settings.json
  ansible.builtin.command:
    cmd: >
      node -e "
        const fs = require('fs');
        const sp = '{{ claude_dir }}/settings.json';
        const mp = '{{ claude_cache_dir }}/settings-merge.json';
        const s = JSON.parse(fs.readFileSync(sp, 'utf8'));
        const m = JSON.parse(fs.readFileSync(mp, 'utf8'));
        let changed = false;
        if (!s.extraKnownMarketplaces) s.extraKnownMarketplaces = {};
        for (const [name, url] of Object.entries(m.marketplaces)) {
          if (!s.extraKnownMarketplaces[name]) {
            s.extraKnownMarketplaces[name] = { source: { source: 'git', url } };
            changed = true;
          }
        }
        if (!s.enabledPlugins) s.enabledPlugins = {};
        for (const plugin of m.plugins) {
          if (s.enabledPlugins[plugin] !== true) {
            s.enabledPlugins[plugin] = true;
            changed = true;
          }
        }
        if (changed) {
          fs.writeFileSync(sp, JSON.stringify(s, null, 2) + '\n');
          console.log('added');
        } else {
          console.log('exists');
        }
      "
  register: settings_merge
  changed_when: "'added' in settings_merge.stdout"

# ── Cleanup ──────────────────────────────────────────────────────────────────

- name: Remove cached repos
  ansible.builtin.file:
    path: "{{ claude_cache_dir }}"
    state: absent
