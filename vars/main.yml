---
# Directories
src_dir: "{{ ansible_facts['env']['HOME'] }}/src"

# Oh My Zsh
omz_install_url: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"
omz_plugins:
  - name: zsh-autosuggestions
    repo: "https://github.com/zsh-users/zsh-autosuggestions"
  - name: zsh-syntax-highlighting
    repo: "https://github.com/zsh-users/zsh-syntax-highlighting"

# Homebrew
homebrew_taps:
  - chipmk/tap
  - common-fate/granted
  - goreleaser/tap
  - hashicorp/tap

homebrew_packages:
  - ansible
  - bat
  - gopls
  - jdtls
  - typescript-language-server
  - caddy
  - chipmk/tap/docker-mac-net-connect
  - chruby
  - common-fate/granted/granted
  - curl
  - doctl
  - docutils
  - fd
  - fzf
  - gh
  - git
  - go
  - golang-migrate
  - googletest
  - goreleaser/tap/goreleaser
  - hashicorp/tap/terraform
  - hugo
  - jq
  - just
  - libpq
  - lsd
  - mysql
  - neovim
  - nmap
  - perl
  - pipx
  - protobuf@29
  - pyenv
  - python-setuptools
  - python@3.12
  - qpdf
  - qrencode
  - ripgrep
  - ruby-install
  - telnet
  - terraform-docs
  - terragrunt
  - tesseract
  - tflint
  - the_silver_searcher
  - tmux
  - tree
  - trivy
  - universal-ctags
  - uv
  - zeromq
  - rbenv
  - ruby-build

homebrew_casks:
  - bitwarden
  - brave-browser
  - jetbrains-toolbox
  #- jumpcut
  - licecap
  - neovide
  #- ngrok

# Casks that require sudo for .pkg installation (installed separately)
homebrew_casks_sudo:
  - karabiner-elements

# Fonts (manually installed - not in Homebrew)
monaco_nerd_font_url: "https://github.com/thep0y/monaco-nerd-font/releases/download/v0.2.1/MonacoNerdFont.zip"

# Environment variables - set via LaunchAgent for GUI apps and .zshrc for shell
env_vars_macos:
  SSH_AUTH_SOCK: "{{ ansible_facts['env']['HOME'] }}/.bitwarden-ssh-agent.sock"

# Additional paths to add to PATH
extra_path_dirs_macos:
  - "{{ ansible_facts['env']['HOME'] }}/go/bin"
  - "{{ ansible_facts['env']['HOME'] }}/.local/bin"

# Git repositories to clone (requires SSH keys to be set up)
git_repos: []

# Go tools (installed via go install, requires Go from homebrew)
go_tools:
  - github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  - github.com/securego/gosec/v2/cmd/gosec@latest
  - golang.org/x/vuln/cmd/govulncheck@latest
  - golang.org/x/tools/cmd/deadcode@latest
  - github.com/go-gremlins/gremlins/cmd/gremlins@latest

# Claude Code
claude_dir: "{{ ansible_facts['env']['HOME'] }}/.claude"
claude_cache_dir: "{{ ansible_facts['env']['HOME'] }}/.cache/macbook-setup"

# Skills fetched from https://github.com/citypaul/.dotfiles (claude/.claude/skills/)
citypaul_skills:
  - ci-debugging
  - domain-driven-design
  - expectations
  - front-end-testing
  - functional
  - hexagonal-architecture
  - mutation-testing
  - planning
  - react-testing
  - refactoring
  - tdd
  - test-design-reviewer
  - testing
  - typescript-strict

# Agents fetched from https://github.com/citypaul/.dotfiles (claude/.claude/agents/)
citypaul_agents:
  - adr.md
  - docs-guardian.md
  - learn.md
  - pr-reviewer.md
  - progress-guardian.md
  - refactor-scan.md
  - tdd-guardian.md
  - ts-enforcer.md
  - use-case-data-patterns.md

# Skills fetched from https://github.com/vercel/vercel-plugin (skills/)
vercel_skills:
  - shadcn
  - react-best-practices
  - agent-browser

# Plugins enabled in settings.json (auto-installed by Claude Code)
# Extra plugin marketplaces (git repos with .claude-plugin marker)
claude_extra_marketplaces:
  cloudflare: "https://github.com/cloudflare/skills.git"

claude_plugins:
  - frontend-design@claude-code-plugins
  - gopls-lsp@claude-plugins-official
  - jdtls-lsp@claude-plugins-official
  - code-simplifier@claude-plugins-official
  - claude-md-management@claude-plugins-official
  - playwright@claude-plugins-official
  - typescript-lsp@claude-plugins-official
  - superpowers@claude-plugins-official
  - plugin-dev@claude-plugins-official
  - skill-creator@claude-plugins-official
  - cloudflare@cloudflare

# Machine-specific overrides (defined in vars/local.yml, which is gitignored)
# Extra environment variables (e.g. NODE_EXTRA_CA_CERTS for Cloudflare Warp)
extra_env_vars: {}
# Extra raw shell config appended to .zshrc (e.g. work-specific aliases, functions)
extra_shell_config: ""
# Extra PATH directories
extra_path_dirs: []
